<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }
        canvas { background: #1d1d1d; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        const paddleWidth = 10, paddleHeight = 100, ballSize = 10;
        let playerPaddle = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "#fff" };
        let aiPaddle = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "#fff" };
        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speed: 4, dx: 4, dy: 4, color: "#fff" };

        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawArc(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Collision detection
            if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {
                ball.dy *= -1;
            }

            if (ball.x - ball.size < playerPaddle.x + playerPaddle.width && ball.y > playerPaddle.y && ball.y < playerPaddle.y + playerPaddle.height) {
                ball.dx *= -1;
            }

            if (ball.x + ball.size > aiPaddle.x && ball.y > aiPaddle.y && ball.y < aiPaddle.y + aiPaddle.height) {
                ball.dx *= -1;
            }

            // AI movement
            aiPaddle.y += ((ball.y - (aiPaddle.y + aiPaddle.height / 2)) * 0.1);
        }

        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, "#1d1d1d");
            drawRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height, playerPaddle.color);
            drawRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height, aiPaddle.color);
            drawArc(ball.x, ball.y, ball.size, ball.color);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener("mousemove", (event) => {
            const rect = canvas.getBoundingClientRect();
            playerPaddle.y = event.clientY - rect.top - playerPaddle.height / 2;
        });

        gameLoop();
    </script>
</body>
</html>
